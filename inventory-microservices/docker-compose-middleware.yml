services:
  # 1. Redis: 缓存与 Token 存储
  redis-server:
    image: redis:7-alpine
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Nacos: 注册中心与配置中心
  nacos-server:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos-server
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=host.docker.internal
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=demo1
      - MYSQL_SERVICE_USER=user1
      - MYSQL_SERVICE_PASSWORD=user1
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - JVM_XMS=1g
      - JVM_XMX=1g
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 4. Sentinel Dashboard: 流量治理控制台
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: sentinel-dashboard
    restart: always
    ports:
      - "8858:8858"
    networks:
      - microservice-network

  # 5. Seata Server: 分布式事务协调者
  seata-server:
    image: seataio/seata-server:1.8.0
    container_name: seata-server
    restart: always
    environment:
      - SEATA_IP=seata-server
      - STORE_MODE=file
    ports:
      - "8091:8091"
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge
