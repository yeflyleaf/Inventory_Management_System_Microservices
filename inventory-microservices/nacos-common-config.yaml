# Nacos 共享配置 (common.yaml)
# 用于管理各微服务的公共数据库、Redis、MyBatis 及 Seata 连接信息

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:host.docker.internal}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:demo1}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
    username: ${MYSQL_USERNAME:user1}
    password: ${MYSQL_PASSWORD:user1}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:host.docker.internal}
      port: ${REDIS_PORT:6379}
      database: 0

mybatis:
  configuration:
    map-underscore-to-camel-case: true

seata:
  enabled: true
  tx-service-group: inventory_tx_group
  service:
    vgroup-mapping:
      inventory_tx_group: default
    grouplist:
      default: ${SEATA_HOST:127.0.0.1}:8091
