        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: gateway-service:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
        envFrom:
        - configMapRef:
            name: microservice-config
        - secretRef:
            name: microservice-secret
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          httpGet:
