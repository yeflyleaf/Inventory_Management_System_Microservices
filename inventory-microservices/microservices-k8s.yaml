# =====================================================================
# Kubernetes 微服务部署清单 (合并版)
# =====================================================================
# 此文件为 k8s/ 目录拆分清单的合并版本，内容保持一致。
# 包含：Namespace → ConfigMap/Secret → 中间件 → 业务微服务 → 前端
#
# 一键部署（不推荐，推荐使用 deploy-k8s.ps1/sh 脚本）：
#   kubectl apply -f microservices-k8s.yaml
#
# 推荐使用一键脚本部署（会自动等待中间件就绪并发布 Nacos 配置）：
#   powershell -ExecutionPolicy Bypass -File .\deploy-k8s.ps1
# =====================================================================

# --- 0. Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: inventory-system
  labels:
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/managed-by: kubectl

---
# --- 0.1 ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservice-config
  namespace: inventory-system
  labels:
    app.kubernetes.io/part-of: inventory-management
data:
  MYSQL_HOST: "mysql-service"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "demo1"
  NACOS_HOST: "nacos-service"
  NACOS_PORT: "8848"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  SEATA_HOST: "seata-service"
  SEATA_PORT: "8091"
  SENTINEL_DASHBOARD: "sentinel-service"
  SENTINEL_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "k8s"
  JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

---
# --- 0.2 Secret ---
apiVersion: v1
kind: Secret
metadata:
  name: microservice-secret
  namespace: inventory-system
  labels:
    app.kubernetes.io/part-of: inventory-management
type: Opaque
stringData:
  MYSQL_USERNAME: "user1"
  MYSQL_PASSWORD: "user1"

---
# --- 1. Host MySQL mapping ---
# MySQL must run on the host machine, not in Docker or Kubernetes.
# Pods use mysql-service as an in-cluster DNS alias for host.docker.internal.
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: inventory-system
  labels:
    app: mysql
    app.kubernetes.io/part-of: inventory-management
spec:
  type: ExternalName
  externalName: host.docker.internal

---
# --- 2. Nacos ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: inventory-system
  labels:
    app: nacos
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.3.2
        env:
        - name: MODE
          value: "standalone"
        - name: SPRING_DATASOURCE_PLATFORM
          value: "mysql"
        - name: MYSQL_SERVICE_HOST
          value: "mysql-service"
        - name: MYSQL_SERVICE_PORT
          value: "3306"
        - name: MYSQL_SERVICE_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: microservice-config
              key: MYSQL_DATABASE
        - name: MYSQL_SERVICE_USER
          valueFrom:
            secretKeyRef:
              name: microservice-secret
              key: MYSQL_USERNAME
        - name: MYSQL_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservice-secret
              key: MYSQL_PASSWORD
        - name: MYSQL_SERVICE_DB_PARAM
          value: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        - name: JVM_XMS
          value: "256m"
        - name: JVM_XMX
          value: "256m"
        ports:
        - containerPort: 8848
          name: http
        - containerPort: 9848
          name: rpc
        - containerPort: 9849
          name: raft
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /nacos/index.html
            port: 8848
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /nacos/index.html
            port: 8848
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: nacos-service
  namespace: inventory-system
  labels:
    app: nacos
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: nacos
  ports:
  - name: http
    port: 8848
    targetPort: 8848
    nodePort: 30848
  - name: rpc
    port: 9848
    targetPort: 9848
  - name: raft
    port: 9849
    targetPort: 9849
  type: NodePort

---
# --- 3. Redis ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: inventory-system
  labels:
    app: redis
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: redis
        image: redis:7-alpine
        command:
        - redis-server
        - "--appendonly"
        - "yes"
        - "--maxmemory"
        - "200mb"
        - "--maxmemory-policy"
        - "allkeys-lru"
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: redis-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: inventory-system
  labels:
    app: redis
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
  type: ClusterIP

---
# --- 4. Seata ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seata
  namespace: inventory-system
  labels:
    app: seata
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: seata
  template:
    metadata:
      labels:
        app: seata
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: seata
        image: seataio/seata-server:1.8.0
        env:
        - name: SEATA_IP
          value: "seata-service"
        - name: STORE_MODE
          value: "file"
        ports:
        - containerPort: 8091
          name: rpc
        - containerPort: 7091
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: seata-service
  namespace: inventory-system
  labels:
    app: seata
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: seata
  ports:
  - name: rpc
    port: 8091
    targetPort: 8091
  - name: http
    port: 7091
    targetPort: 7091
  type: ClusterIP

---
# --- 5. Sentinel Dashboard ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  namespace: inventory-system
  labels:
    app: sentinel
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: sentinel
        image: bladex/sentinel-dashboard:1.8.8
        env:
        - name: JAVA_OPTS
          value: "-Xms128m -Xmx256m"
        ports:
        - containerPort: 8858
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8858
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8858
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-service
  namespace: inventory-system
  labels:
    app: sentinel
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: sentinel
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8858
  type: ClusterIP

---
# --- 6. User Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: inventory-system
  labels:
    app: user-service
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: wait-nacos
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zw3 nacos-service 8848; do echo "Waiting for Nacos..."; sleep 5; done']
      containers:
      - name: user-service
        image: user-service:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: JAVA_OPTS
          value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        envFrom:
        - configMapRef:
            name: microservice-config
        - secretRef:
            name: microservice-secret
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 20

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: inventory-system
  labels:
    app: user-service
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
  type: ClusterIP

---
# --- 7. Product Service ---
apiVersion: apps/v1
