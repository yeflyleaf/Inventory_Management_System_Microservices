# ==========================================
# HorizontalPodAutoscaler — 弹性伸缩
# ==========================================
# 注意: HPA 需要集群中部署 Metrics Server。
# Docker Desktop 默认未安装, 需手动部署:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# 然后手动 apply 此文件:
#   kubectl apply -f k8s/hpa.yaml
# ==========================================

---
# Gateway Service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-service-hpa
  namespace: inventory-system
  labels:
    app.kubernetes.io/part-of: inventory-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120

