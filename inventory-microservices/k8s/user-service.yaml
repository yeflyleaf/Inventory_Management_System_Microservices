# ==========================================
# User Service - 用户认证与数据看板服务
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: inventory-system
  labels:
    app: user-service
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 60
      # 等待 Nacos 就绪后再启动业务容器
      initContainers:
      - name: wait-nacos
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zw3 nacos-service 8848; do echo "Waiting for Nacos..."; sleep 5; done']
      containers:
      - name: user-service
        image: user-service:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: JAVA_OPTS
          value: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        envFrom:
        - configMapRef:
            name: microservice-config
        - secretRef:
            name: microservice-secret
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: inventory-system
  labels:
    app: user-service
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
  type: ClusterIP
