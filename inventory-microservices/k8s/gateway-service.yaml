# ==========================================
# Gateway Service - API 网关 (对外入口)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: inventory-system
  labels:
    app: gateway-service
    app.kubernetes.io/part-of: inventory-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: gateway-service:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
          name: http
        envFrom:
        - configMapRef:
            name: microservice-config
        - secretRef:
            name: microservice-secret
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: inventory-system
  labels:
    app: gateway-service
spec:
  selector:
    app: gateway-service
  ports:
  - protocol: TCP
    port: 8888
    targetPort: 8888
    nodePort: 30088
  type: NodePort
