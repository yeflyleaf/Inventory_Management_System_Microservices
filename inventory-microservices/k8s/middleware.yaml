---
# ==========================================
# MySQL 宿主机服务映射 (指向外部 demo1 数据库)
# MySQL 必须运行在宿主机本地 (端口 3306)
# K8s Pod 通过 host.docker.internal 域名连接
# ==========================================

# --- 方案 A: 使用 Docker Desktop 内部域名 (推荐) ---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: inventory-system
  labels:
    app: mysql
    app.kubernetes.io/part-of: inventory-management
spec:
  type: ExternalName
  externalName: host.docker.internal

# --- 方案 B: 使用具体 IP 映射 (已注释) ---
# apiVersion: v1
# kind: Service
# metadata:
#   name: mysql-service
#   namespace: inventory-system
# spec:
#   ports:
#   - protocol: TCP
#     port: 3306
#     targetPort: 3306
# ---
# apiVersion: v1
# kind: Endpoints
# metadata:
#   name: mysql-service
#   namespace: inventory-system
# subsets:
#   - addresses:
#       - ip: 192.168.1.100
#     ports:
#       - port: 3306


---
# ==========================================
# Nacos 注册中心 & 配置中心 (Standalone)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: inventory-system
  labels:
    app: nacos
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.3.2
        env:
        - name: MODE
          value: "standalone"
        - name: SPRING_DATASOURCE_PLATFORM
          value: "mysql"
        - name: MYSQL_SERVICE_HOST
          value: "mysql-service"
        - name: MYSQL_SERVICE_PORT
          value: "3306"
        - name: MYSQL_SERVICE_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: microservice-config
              key: MYSQL_DATABASE
        - name: MYSQL_SERVICE_USER
          valueFrom:
            secretKeyRef:
              name: microservice-secret
              key: MYSQL_USERNAME
        - name: MYSQL_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservice-secret
              key: MYSQL_PASSWORD
        - name: MYSQL_SERVICE_DB_PARAM
          value: "characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        - name: JVM_XMS
          value: "256m"
        - name: JVM_XMX
          value: "256m"
        ports:
        - containerPort: 8848
          name: http
        - containerPort: 9848
          name: rpc
        - containerPort: 9849
          name: raft
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /nacos/index.html
            port: 8848
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /nacos/index.html
            port: 8848
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nacos-service
  namespace: inventory-system
  labels:
    app: nacos
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: nacos
  ports:
  - name: http
    port: 8848
    targetPort: 8848
  - name: rpc
    port: 9848
    targetPort: 9848
  - name: raft
    port: 9849
    targetPort: 9849
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nacos-service-external
  namespace: inventory-system
  labels:
    app: nacos
    app.kubernetes.io/part-of: inventory-management
spec:
  type: LoadBalancer
  selector:
    app: nacos
  ports:
  - name: http
    port: 30848
    targetPort: 8848

---
# ==========================================
# Redis 缓存 & Token 存储
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: inventory-system
  labels:
    app: redis
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: redis
        image: redis:7-alpine
        command:
        - redis-server
        - "--appendonly"
        - "yes"
        - "--maxmemory"
        - "200mb"
        - "--maxmemory-policy"
        - "allkeys-lru"
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: redis-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: inventory-system
  labels:
    app: redis
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
  type: ClusterIP

---
# ==========================================
# Seata Server 分布式事务协调者
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seata
  namespace: inventory-system
  labels:
    app: seata
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: seata
  template:
    metadata:
      labels:
        app: seata
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: seata
        image: seataio/seata-server:1.8.0
        env:
        - name: SEATA_IP
          value: "seata-service"
        - name: STORE_MODE
          value: "file"
        ports:
        - containerPort: 8091
          name: rpc
        - containerPort: 7091
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8091
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: seata-service
  namespace: inventory-system
  labels:
    app: seata
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: seata
  ports:
  - name: rpc
    port: 8091
    targetPort: 8091
  - name: http
    port: 7091
    targetPort: 7091
  type: ClusterIP

---
# ==========================================
# Sentinel Dashboard 流量治理控制台
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  namespace: inventory-system
  labels:
    app: sentinel
    app.kubernetes.io/part-of: inventory-management
    app.kubernetes.io/component: middleware
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
        app.kubernetes.io/part-of: inventory-management
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: sentinel
        image: bladex/sentinel-dashboard:1.8.8
        env:
        - name: JAVA_OPTS
          value: "-Xms128m -Xmx256m"
        ports:
        - containerPort: 8858
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8858
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8858
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-service
  namespace: inventory-system
  labels:
    app: sentinel
    app.kubernetes.io/part-of: inventory-management
spec:
  selector:
    app: sentinel
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8858
  type: ClusterIP
