# ==========================================
# ConfigMap: 存放非敏感配置
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservice-config
  namespace: inventory-system
  labels:
    app.kubernetes.io/part-of: inventory-management
data:
  # --- 数据库 ---
  MYSQL_HOST: "mysql-service"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "demo1"
  # --- 中间件服务发现地址 ---
  NACOS_HOST: "nacos-service"
  NACOS_PORT: "8848"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  SEATA_HOST: "seata-service"
  SEATA_PORT: "8091"
  SENTINEL_DASHBOARD: "sentinel-service"
  SENTINEL_PORT: "8080"
  # --- 运行环境标识 ---
  SPRING_PROFILES_ACTIVE: "k8s"
  # --- JVM 默认参数 (可被 Deployment 覆盖) ---
  JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
---
# ==========================================
# Secret: 存放敏感凭证
# (生产环境应使用外部密钥管理, 如 Vault 或 Sealed Secrets)
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: microservice-secret
  namespace: inventory-system
  labels:
    app.kubernetes.io/part-of: inventory-management
type: Opaque
stringData:
  MYSQL_USERNAME: "user1"
  MYSQL_PASSWORD: "user1"
