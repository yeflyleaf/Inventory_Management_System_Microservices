server {
    listen 80;
    server_name localhost;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 上传大小限制 (与网关保持一致)
    client_max_body_size 50M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 支持 Vue Router history 模式
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存 (30天)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 入口 HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store";
        }
    }

    # 反向代理到 K8s 内部的 gateway-service
    location /api/ {
        proxy_pass http://gateway-service.inventory-system.svc.cluster.local:8888;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 解决网关超时问题
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://gateway-service.inventory-system.svc.cluster.local:8888/uploads/;
        expires 7d;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    # 禁止访问隐藏文件
    location ~ /\. { deny all; access_log off; }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
